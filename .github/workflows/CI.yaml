name: CI
on:
    workflow_dispatch: {}
    push:
        branches:
            - master
        paths-ignore:
            - '.github/**'
            - '.vscode/**'
            - '.husky/**'
            - '.eslintignore'
            - '.gitignore'
            - 'build/**'
            - '**.md'
            - 'LICENSE'
            - 'renovate.json'

    pull_request:
        types: [opened, synchronize]
        paths-ignore:
            - '.vscode/**'
            - '.husky/**'
            - '.eslintignore'
            - '.gitignore'
            - '**.md'
            - 'LICENSE'
            - 'renovate.json'
jobs:
    ci:
        name: CI
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v6
            - uses: oven-sh/setup-bun@v2
            - run: bun install --frozen-lockfile
            - run: bun run lint
            - run: bun run fmt
            - run: bun test
    build:
        name: Update `build/` artifacts
        runs-on: ubuntu-latest
        needs: [ci] # Ensure that `ci` completes successfully.
        if: ${{github.repository == 'auguwu/clippy-action' && github.event_name != 'pull_request'}}
        steps:
            - uses: actions/checkout@v6
            - uses: oven-sh/setup-bun@v2
            - run: bun install --frozen
            - run: bun run build
            - uses: EndBug/add-and-commit@v10
              with:
                  add: 'build'
                  author_name: 'Noel[bot]'
                  author_email: noelbot@users.noreply.github.com
                  default_author: user_info
                  message: '[skip ci] :sparkles: Update build artifacts'
                  push: true
